{% extends 'base.html' %}
{% block title %}修改密码 - 屈氏宗谱{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <div style="font-family:var(--font-title);font-size:2.5rem;color:var(--heritage-gold);line-height:1;margin-bottom:0.5rem">
                <i class="bi bi-shield-lock"></i>
            </div>
            <h2 class="mb-1" style="font-family:var(--font-title);letter-spacing:0.1em">修改密码</h2>
            <div class="heritage-divider" style="width:6rem"></div>
        </div>

        {% if is_forced %}
        <div class="alert alert-warning">
            <i class="bi bi-exclamation-triangle me-2"></i>首次登录，请先修改默认密码后才能使用系统功能。
        </div>
        {% endif %}

        <div class="card heritage-card">
            <div class="card-body p-4">
                <form method="post" action="{{ url_for('change_password') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label for="old_password" class="form-label"><i class="bi bi-lock me-1"></i>当前密码</label>
                        <input type="password" id="old_password" name="old_password" class="form-control" required autocomplete="current-password">
                    </div>
                    <div class="mb-3">
                        <label for="new_password" class="form-label"><i class="bi bi-key me-1"></i>新密码</label>
                        <input type="password" id="new_password" name="new_password" class="form-control" required minlength="6" autocomplete="new-password">
                        <div class="form-text">密码长度不少于 6 位</div>
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label"><i class="bi bi-key-fill me-1"></i>确认新密码</label>
                        <input type="password" id="confirm_password" name="confirm_password" class="form-control" required minlength="6" autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-2"><i class="bi bi-check-circle me-1"></i>确认修改</button>
                    {% if not is_forced %}
                    <a href="{{ url_for('index') }}" class="btn btn-outline-secondary w-100">返回首页</a>
                    {% endif %}
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
