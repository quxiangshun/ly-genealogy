{% extends 'base.html' %}
{% block title %}{{ title }} - 屈氏宗谱{% endblock %}
{% block content %}
<h2>{{ title }}</h2>
<form method="post" class="mt-3">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
        <label for="surname" class="form-label">姓氏 <span class="text-danger">*</span></label>
        <input type="text" id="surname" name="surname" class="form-control" required
               value="{{ genealogy.surname if genealogy else '' }}"
               {% if genealogy %}readonly{% endif %} placeholder="如：屈">
        {% if genealogy %}<small class="text-muted">编辑时不可修改姓氏</small>{% endif %}
    </div>
    <div class="mb-3">
        <label for="genealogy_name" class="form-label">族谱名称 <span class="text-danger">*</span></label>
        <input type="text" id="genealogy_name" name="genealogy_name" class="form-control" required
               value="{{ genealogy.genealogy_name if genealogy else '' }}" placeholder="如：江苏常熟临海屈氏世谱十九卷">
    </div>
    <div class="row">
        <div class="col-md-4 mb-3">
            <label for="region" class="form-label">地区</label>
            <input type="text" id="region" name="region" class="form-control"
                   value="{{ genealogy.region if genealogy else '' }}" placeholder="如：江苏常熟、湖北秭归">
        </div>
        <div class="col-md-4 mb-3">
            <label for="period" class="form-label">年代/刊本</label>
            <input type="text" id="period" name="period" class="form-control"
                   value="{{ genealogy.period if genealogy else '' }}" placeholder="如：清代、道光十年、民国">
        </div>
        <div class="col-md-4 mb-3">
            <label for="volumes" class="form-label">卷数</label>
            <input type="text" id="volumes" name="volumes" class="form-control"
                   value="{{ genealogy.volumes if genealogy else '' }}" placeholder="如：十九卷、一卷">
        </div>
    </div>
    <div class="row">
        <div class="col-md-6 mb-3">
            <label for="hall_name" class="form-label">堂号</label>
            <input type="text" id="hall_name" name="hall_name" class="form-control"
                   value="{{ genealogy.hall_name if genealogy and genealogy.hall_name else '' }}" placeholder="如：敦睦堂、惇叙堂">
        </div>
        <div class="col-md-6 mb-3">
            <label for="source_url" class="form-label">参考链接</label>
            <input type="url" id="source_url" name="source_url" class="form-control"
                   value="{{ genealogy.source_url if genealogy and genealogy.source_url else '' }}" placeholder="如：zupu.cn 查阅链接">
        </div>
    </div>
    <div class="row">
        <div class="col-md-6 mb-3">
            <label for="scattered_region" class="form-label">散居地</label>
            <input type="text" id="scattered_region" name="scattered_region" class="form-control"
                   value="{{ genealogy.scattered_region if genealogy and genealogy.scattered_region else '' }}" placeholder="如：湖南省湘乡县、双峰县等地">
        </div>
        <div class="col-md-6 mb-3">
            <label for="collection_info" class="form-label">馆藏/收藏信息</label>
            <input type="text" id="collection_info" name="collection_info" class="form-control"
                   value="{{ genealogy.collection_info if genealogy and genealogy.collection_info else '' }}" placeholder="如：藏中国湖南图书馆">
        </div>
    </div>
    <div class="mb-3">
        <label for="founder_info" class="form-label">始祖/世系源流</label>
        <textarea id="founder_info" name="founder_info" class="form-control" rows="2" placeholder="始祖、远祖、始迁祖等源流概述">{{ genealogy.founder_info if genealogy and genealogy.founder_info else '' }}</textarea>
    </div>
    <div class="mb-3">
        <label for="description" class="form-label">备注说明</label>
        <textarea id="description" name="description" class="form-control" rows="3" placeholder="族谱备注等">{{ genealogy.description if genealogy else '' }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">保存</button>
    <a href="{{ url_for('genealogy.list_genealogies') }}" class="btn btn-secondary">取消</a>
    {% if genealogy %}
    <a href="{{ url_for('genealogy.generations', genealogy_id=genealogy.id) }}" class="btn btn-outline-secondary">字辈表</a>
    {% endif %}
</form>
{% endblock %}
