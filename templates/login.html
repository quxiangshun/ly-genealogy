{% extends 'base.html' %}
{% block title %}登录 - 屈氏宗谱{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <div style="font-family:var(--font-title);font-size:3rem;color:var(--heritage-gold);line-height:1;margin-bottom:0.5rem">屈</div>
            <h2 class="mb-1" style="font-family:var(--font-title);letter-spacing:0.1em">宗亲登录</h2>
            <div class="heritage-divider" style="width:6rem"></div>
        </div>
        <p class="text-muted small text-center mb-4">登录后可查看成员列表、世系树、成员查询等信息；未登录时仅展示公开内容。</p>
        <div class="card heritage-card">
            <div class="card-body p-4">
                <form method="post" action="{{ url_for('login') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label for="username" class="form-label"><i class="bi bi-person me-1"></i>用户名</label>
                        <input type="text" id="username" name="username" class="form-control" required autocomplete="username">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label"><i class="bi bi-lock me-1"></i>密码</label>
                        <input type="password" id="password" name="password" class="form-control" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-2"><i class="bi bi-box-arrow-in-right me-1"></i>登录</button>
                    <a href="{{ url_for('index') }}" class="btn btn-outline-secondary w-100">返回首页</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
