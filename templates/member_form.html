{% extends 'base.html' %}
{% block title %}{{ title }} - 屈氏宗谱{% endblock %}
{% block content %}
<h2>{{ title }}</h2>
<form method="post" class="mt-3" enctype="multipart/form-data">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
        <label for="genealogy_id" class="form-label">所属族谱 <span class="text-danger">*</span></label>
        <select id="genealogy_id" name="genealogy_id" class="form-select" required {% if member %}disabled{% endif %}>
            <option value="">-- 请选择族谱 --</option>
            {% for g in genealogies %}
            <option value="{{ g.id }}" {% if member and member.genealogy_id == g.id %}selected{% endif %}>{{ g.genealogy_name }}（{{ g.surname }}氏）</option>
            {% endfor %}
        </select>
        {% if member %}<input type="hidden" name="genealogy_id" value="{{ member.genealogy_id }}">{% endif %}
    </div>

    <div class="row">
        <div class="col-md-4 mb-3">
            <label for="name" class="form-label">姓名 <span class="text-danger">*</span></label>
            <input type="text" id="name" name="name" class="form-control" required value="{{ member.name if member else '' }}" placeholder="如：屈开">
        </div>
        <div class="col-md-2 mb-3">
            <label for="gender" class="form-label">性别</label>
            <select id="gender" name="gender" class="form-select">
                <option value="M" {% if member and member.gender == 'M' %}selected{% endif %}>男</option>
                <option value="F" {% if member and member.gender == 'F' %}selected{% endif %}>女</option>
            </select>
        </div>
        <div class="col-md-3 mb-3">
            <label for="generation_number" class="form-label">世次</label>
            <input type="number" id="generation_number" name="generation_number" class="form-control" min="0"
                   value="{{ member.generation_number if member and member.generation_number else '' }}" placeholder="第几世">
        </div>
        <div class="col-md-3 mb-3">
            <label for="courtesy_name" class="form-label">字/号</label>
            <input type="text" id="courtesy_name" name="courtesy_name" class="form-control"
                   value="{{ member.courtesy_name if member and member.courtesy_name else '' }}" placeholder="字崇益、号大川">
        </div>
    </div>

    <div class="row">
        <div class="col-md-4 mb-3">
            <label for="birth_date" class="form-label">生年</label>
            <input type="text" id="birth_date" name="birth_date" class="form-control"
                   value="{{ member.birth_date if member and member.birth_date else '' }}" placeholder="如：1920-03-15 或 清道光十年">
        </div>
        <div class="col-md-4 mb-3">
            <label for="death_date" class="form-label">卒年</label>
            <input type="text" id="death_date" name="death_date" class="form-control"
                   value="{{ member.death_date if member and member.death_date else '' }}" placeholder="如：1998-12-01 或 不详">
        </div>
        <div class="col-md-4 mb-3">
            <label for="birth_place" class="form-label">出生地/籍贯</label>
            <input type="text" id="birth_place" name="birth_place" class="form-control"
                   value="{{ member.birth_place if member and member.birth_place else '' }}" placeholder="如：贵州余庆">
        </div>
    </div>

    <div class="row">
        <div class="col-md-6 mb-3">
            <label for="spouse_name" class="form-label">配偶</label>
            <input type="text" id="spouse_name" name="spouse_name" class="form-control"
                   value="{{ member.spouse_name if member and member.spouse_name else '' }}" placeholder="配偶姓名">
        </div>
        <div class="col-md-6 mb-3">
            <label for="photo" class="form-label">照片</label>
            {% if member and member.photo %}
            <div class="d-flex align-items-center gap-3 mb-2">
                <img src="{{ url_for('static', filename=member.photo) }}" alt="{{ member.name }}" class="member-photo-preview rounded">
                <label class="mb-0"><input type="checkbox" name="remove_photo" value="1"> 删除照片</label>
            </div>
            {% endif %}
            <input type="file" id="photo" name="photo" class="form-control" accept="image/png,image/jpeg,image/jpg,image/gif,image/webp">
        </div>
    </div>

    <div class="mb-3">
        <label for="father_id" class="form-label">父亲</label>
        <select id="father_id" name="father_id" class="form-select">
            <option value="">-- 无 / 未知 --</option>
            {% if member %}
            {% for m in father_candidates %}
            <option value="{{ m.id }}" {% if member.father_id == m.id %}selected{% endif %}>{{ m.name }}{% if m.generation_number %} ({{ m.generation_number }}世){% endif %}</option>
            {% endfor %}
            {% else %}
            {% for g in genealogies %}
            <optgroup label="{{ g.genealogy_name }}" data-genealogy-id="{{ g.id }}">
                {% for m in g.members %}
                {% if m.gender == 'M' %}
                <option value="{{ m.id }}" data-genealogy-id="{{ g.id }}">{{ m.name }}{% if m.generation_number %} ({{ m.generation_number }}世){% endif %}</option>
                {% endif %}
                {% endfor %}
            </optgroup>
            {% endfor %}
            {% endif %}
        </select>
        <div class="form-text">父母只能从本族谱已有成员中选择。</div>
    </div>
    <div class="mb-3">
        <label for="mother_id" class="form-label">母亲</label>
        <select id="mother_id" name="mother_id" class="form-select">
            <option value="">-- 无 / 未知 --</option>
            {% if member %}
            {% for m in mother_candidates %}
            <option value="{{ m.id }}" {% if member.mother_id == m.id %}selected{% endif %}>{{ m.name }}</option>
            {% endfor %}
            {% else %}
            {% for g in genealogies %}
            <optgroup label="{{ g.genealogy_name }}" data-genealogy-id="{{ g.id }}">
                {% for m in g.members %}
                {% if m.gender == 'F' %}
                <option value="{{ m.id }}" data-genealogy-id="{{ g.id }}">{{ m.name }}</option>
                {% endif %}
                {% endfor %}
            </optgroup>
            {% endfor %}
            {% endif %}
        </select>
    </div>
    <div class="mb-3">
        <label for="notes" class="form-label">备注</label>
        <textarea id="notes" name="notes" class="form-control" rows="2" placeholder="身份、事迹、职业等">{{ member.notes if member else '' }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">保存</button>
    <a href="{{ url_for('member.list_members') }}" class="btn btn-secondary">取消</a>
</form>
{% if not member %}
<script>
(function () {
    var selG = document.getElementById('genealogy_id');
    var selF = document.getElementById('father_id');
    var selM = document.getElementById('mother_id');
    if (!selG || !selF || !selM) return;
    function filter() {
        var gid = (selG.value || '').toString();
        [selF, selM].forEach(function (sel) {
            sel.querySelectorAll('option[data-genealogy-id]').forEach(function (o) { o.style.display = o.getAttribute('data-genealogy-id') === gid ? '' : 'none'; });
            sel.querySelectorAll('optgroup[data-genealogy-id]').forEach(function (g) { g.style.display = g.getAttribute('data-genealogy-id') === gid ? '' : 'none'; });
            if (!gid) sel.selectedIndex = 0;
        });
    }
    selG.addEventListener('change', filter);
    filter();
})();
</script>
{% endif %}
{% endblock %}
