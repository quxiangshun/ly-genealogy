{% extends 'base.html' %}
{% block title %}{{ title_text }} - 屈氏宗谱{% endblock %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="bi bi-newspaper me-2"></i>{{ title_text }}</h4>
    <a href="{{ url_for('news.admin_list') }}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>返回列表</a>
</div>

<form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="row g-3 mb-3">
        <div class="col-md-8">
            <label class="form-label">标题 <span class="text-danger">*</span></label>
            <input type="text" name="title" class="form-control" value="{{ article.title if article else '' }}" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">URL 别名（可留空自动生成）</label>
            <input type="text" name="slug" class="form-control" value="{{ article.slug if article else '' }}" placeholder="自动生成">
        </div>
    </div>

    <div class="row g-3 mb-3">
        <div class="col-md-3">
            <label class="form-label">分类</label>
            <select name="category" class="form-select">
                {% for code, label in categories %}
                <option value="{{ code }}" {% if article and article.category == code %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-3">
            <label class="form-label">事件日期</label>
            <input type="text" name="event_date" class="form-control" value="{{ article.event_date if article else '' }}" placeholder="如：2024-06-10 或 公元前278年">
        </div>
        <div class="col-md-3">
            <label class="form-label">来源</label>
            <input type="text" name="source" class="form-control" value="{{ article.source if article else '' }}" placeholder="新闻来源（可选）">
        </div>
        <div class="col-md-3 d-flex align-items-end gap-3">
            <div class="form-check">
                <input type="checkbox" name="is_published" value="1" class="form-check-input" id="isPub" {% if not article or article.is_published %}checked{% endif %}>
                <label class="form-check-label" for="isPub">发布</label>
            </div>
            <div class="form-check">
                <input type="checkbox" name="is_pinned" value="1" class="form-check-input" id="isPin" {% if article and article.is_pinned %}checked{% endif %}>
                <label class="form-check-label" for="isPin">置顶</label>
            </div>
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">摘要</label>
        <textarea name="summary" class="form-control" rows="2" maxlength="500" placeholder="简短描述（可选）">{{ article.summary if article else '' }}</textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">封面图片 URL</label>
        <input type="text" name="cover_image" class="form-control" value="{{ article.cover_image if article else '' }}" placeholder="可选，填写图片链接">
    </div>

    <div class="mb-3">
        <label class="form-label">正文内容 <span class="text-danger">*</span></label>
        <p class="form-text small mb-2">支持 HTML 格式。可使用 &lt;h4&gt;、&lt;p&gt;、&lt;ul&gt;、&lt;blockquote&gt; 等标签排版。</p>
        <textarea name="content" class="form-control" rows="15" required>{{ article.content if article else '' }}</textarea>
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle me-1"></i>保存</button>
        <a href="{{ url_for('news.admin_list') }}" class="btn btn-outline-secondary">取消</a>
    </div>
</form>

{% endblock %}
