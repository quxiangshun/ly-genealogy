{% extends 'base.html' %}
{% block title %}{{ title_text }} - 屈氏宗谱{% endblock %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="bi bi-journal-bookmark me-2"></i>{{ title_text }}</h4>
    <a href="{{ url_for('wiki.admin_list') }}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>返回列表</a>
</div>

<form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="row g-3 mb-3">
        <div class="col-md-8">
            <label class="form-label">标题 <span class="text-danger">*</span></label>
            <input type="text" name="title" class="form-control" value="{{ entry.title if entry else '' }}" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">URL 别名（可留空自动生成）</label>
            <input type="text" name="slug" class="form-control" value="{{ entry.slug if entry else '' }}" placeholder="自动生成">
        </div>
    </div>

    <div class="row g-3 mb-3">
        <div class="col-md-4">
            <label class="form-label">分类</label>
            <select name="category" class="form-select">
                {% for code, label in categories %}
                <option value="{{ code }}" {% if entry and entry.category == code %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-3">
            <label class="form-label">时代/年代</label>
            <input type="text" name="era" class="form-control" value="{{ entry.era if entry else '' }}" placeholder="如：战国、唐代">
        </div>
        <div class="col-md-3">
            <label class="form-label">排序权重</label>
            <input type="number" name="sort_order" class="form-control" value="{{ entry.sort_order if entry else 0 }}">
        </div>
        <div class="col-md-2 d-flex align-items-end">
            <div class="form-check">
                <input type="checkbox" name="is_published" value="1" class="form-check-input" id="isPub" {% if not entry or entry.is_published %}checked{% endif %}>
                <label class="form-check-label" for="isPub">发布</label>
            </div>
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">摘要</label>
        <textarea name="summary" class="form-control" rows="2" maxlength="500" placeholder="简短描述（可选）">{{ entry.summary if entry else '' }}</textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">封面图片 URL</label>
        <input type="text" name="cover_image" class="form-control" value="{{ entry.cover_image if entry else '' }}" placeholder="可选，填写图片链接">
    </div>

    <div class="mb-3">
        <label class="form-label">正文内容 <span class="text-danger">*</span></label>
        <p class="form-text small mb-2">支持 HTML 格式。可使用 &lt;h4&gt;、&lt;p&gt;、&lt;ul&gt;、&lt;blockquote&gt; 等标签排版。</p>
        <textarea name="content" class="form-control" rows="15" required>{{ entry.content if entry else '' }}</textarea>
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle me-1"></i>保存</button>
        <a href="{{ url_for('wiki.admin_list') }}" class="btn btn-outline-secondary">取消</a>
    </div>
</form>

{% endblock %}
